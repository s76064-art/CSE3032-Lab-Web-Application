<!DOCTYPE html>

<html>
    <head>
        <title>Lab 4 Task-2</title>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <link rel="stylesheet" href="static/style.css">
    </head>
    <body>
        <div class="container">
            <h1>Use JSP Declaration Tag, JSP Scriplet and JSP Expression in Application</h1>
            <form class="card" action="processCurrency.jsp">
                <h2 class="form-title">Currency Conversion</h2>
                <div class="form-group">
                    <label for="amount-input">Amount (RM)</label>
                    <input id="amount-input" name="amount" type="number" step=".01" required placeholder="[in RM]">
                </div>
                <div class="form-group">
                    <label for="convert-type">Convert to</label>
                    <select id="convert-type" name="currencyType">
                        <option value="1">USD</option>
                        <option value="2">EURO</option>
                        <option value="3">JPY</option>
                        <option value="4">SGD</option>
                    </select>
                </div>

                <div class="button-group">
                    <button type="submit" class="btn btn-submit" >Submit</button>
                    <button type="reset" class="btn btn-cancel" >Cancel</button>
                </div>

            </form>
        </div>
    </body>
</html>
